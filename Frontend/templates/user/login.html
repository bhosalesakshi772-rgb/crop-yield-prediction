<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#008cff;
}

a{
text-decoration:none;
color:#4facfe;
}

</style>
</head>

<body>

<div class="box">

<h2>User Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p align="center">
Don't have account?
<a href="/register">Register</a>
</p>

</div>

</body>
</html>
