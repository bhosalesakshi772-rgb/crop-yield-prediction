<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#ff512f,#dd2476);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#dd2476;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#c2185b;
}

</style>
</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Admin Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
